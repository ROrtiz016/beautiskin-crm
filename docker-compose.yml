services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: beautiskin-crm-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      # Browser-facing Next URL (see README). Enables GET→SPA redirects and SPA links from Laravel.
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: beautiskin_crm
      DB_USERNAME: beautiskin
      DB_PASSWORD: beautiskin_password
    depends_on:
      mysql:
        condition: service_healthy

  next:
    image: node:22-bookworm
    container_name: beautiskin-crm-next
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      LARAVEL_API_URL: http://app:8000
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: beautiskin-crm-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: beautiskin_crm
      MYSQL_USER: beautiskin
      MYSQL_PASSWORD: beautiskin_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
