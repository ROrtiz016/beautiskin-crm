services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: beautiskin-crm-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: beautiskin_crm
      DB_USERNAME: beautiskin
      DB_PASSWORD: beautiskin_password
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: beautiskin-crm-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: beautiskin_crm
      MYSQL_USER: beautiskin
      MYSQL_PASSWORD: beautiskin_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
